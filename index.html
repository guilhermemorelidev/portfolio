<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Guilherme Moreli — Desenvolvedor Python & C#. Portfólio pessoal." />
    <meta name="theme-color" content="#09090f" />

    <!-- Open Graph -->
    <meta property="og:title" content="Guilherme Moreli — Dev Python & C#" />
    <meta property="og:description" content="Portfólio de Guilherme Moreli, desenvolvedor Python e C#." />
    <meta property="og:type" content="website" />

    <title>Guilherme Moreli — Desenvolvedor</title>

    <!-- Preconnect para o Google Fonts — reduz latência de DNS/TLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preconnect para o CDN do GSAP -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <!--
      GSAP + ScrollTrigger via CDN
      defer: não bloqueia o parsing do HTML.
      O initGsap() em App.svelte só roda após introDone=true,
      então o GSAP sempre estará pronto quando for chamado.
    -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
